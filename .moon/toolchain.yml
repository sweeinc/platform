# Moon toolchain config for sweeinc/platform
# See https://moonrepo.dev/docs/config/toolchain

$schema: 'https://moonrepo.dev/schemas/toolchain.json'

# Node + pnpm — pinned versions Moon manages
node:
  version: '20.18.0'
  packageManager: 'pnpm'
  pnpm:
    version: '10.33.0'

# TypeScript
typescript:
  syncProjectReferences: false
