name: Deploy @sweefi/facilitator to Fly.io

# Replaces the auto-deploy pipeline that previously lived on the now-archived
# sweeinc/sweefi repo. Triggers only when facilitator code (or one of its
# workspace dependencies — @sweefi/sui, @sweefi/solana) changes on main.

on:
  push:
    branches: [main]
    paths:
      - 'products/sweefi/facilitator/**'
      - 'products/sweefi/sui/**'
      - 'products/sweefi/solana/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-facilitator.yml'
  workflow_dispatch: {} # allow manual deploy from the Actions tab

concurrency:
  group: deploy-facilitator
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --remote-only \
            --config products/sweefi/facilitator/fly.toml \
            --dockerfile products/sweefi/facilitator/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
