# Moon project config for @sweefi/ui-core
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'

project:
  name: 'sweefi-ui-core'
  description: 'Framework-agnostic payment state machine and PaymentAdapter interface for SweeFi'

tasks:
  build:
    command: 'tsdown'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
    outputs:
      - 'dist'

  test:
    command: 'vitest run'
    deps:
      - '~:build'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'package.json'
      - 'vitest.config.ts'

  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'

  clean:
    command: 'rm -rf dist'
    options:
      cache: false
