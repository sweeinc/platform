$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

project:
  name: 'sweefi-cli'

tasks:
  build:
    command: 'tsdown'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
    outputs:
      - 'dist'

  test:
    command: 'vitest run'
    deps:
      - '~:build'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'package.json'

  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'

  clean:
    command: 'rm -rf dist'
    options:
      cache: false
